<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoryFlow - 智能複習助手</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; --card: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #333; margin-top: 0; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:active { opacity: 0.8; }
        .score-btns { display: grid; grid-template-columns: repeat(5, 1-fr); gap: 5px; display: flex; }
        .score-btn { flex: 1; background: #6c757d; }
        .score-1 { background: #e74c3c; } .score-5 { background: #27ae60; }
        .hidden { display: none; }
        .user-tag { font-size: 0.8em; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="card">
        <h2>登入複習帳號</h2>
        <input type="text" id="username" placeholder="輸入你的名字 (例如: 小明)">
        <button onclick="login()">開始複習</button>
    </div>

    <div id="main-section" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="user-tag" id="display-user"></span>
            <button onclick="logout()" style="width: auto; padding: 5px 10px; background: #999;">切換用戶</button>
        </div>

        <div class="card">
            <h3>新增複習項目</h3>
            <input type="text" id="new-item" placeholder="輸入要複習的主題...">
            <button onclick="addItem()">加入清單</button>
        </div>

        <h3>今日待複習</h3>
        <div id="review-list"></div>
    </div>
</div>

<script>
    let currentUser = "";
    let data = [];

    function login() {
        const name = document.getElementById('username').value.trim();
        if (!name) return alert("請輸入名字");
        currentUser = name;
        document.getElementById('display-user').innerText = `目前使用者：${currentUser}`;
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        loadData();
        render();
    }

    function logout() {
        location.reload();
    }

    function loadData() {
        const saved = localStorage.getItem(`memflow_${currentUser}`);
        data = saved ? JSON.parse(saved) : [];
    }

    function saveData() {
        localStorage.setItem(`memflow_${currentUser}`, JSON.stringify(data));
        render();
    }

    function addItem() {
        const content = document.getElementById('new-item').value.trim();
        if (!content) return;
        data.push({
            id: Date.now(),
            content: content,
            nextReview: Date.now(),
            interval: 1 // 初始間隔（小時）
        });
        document.getElementById('new-item').value = "";
        saveData();
    }

    function handleReview(id, score) {
        const item = data.find(i => i.id === id);
        // 簡單演算法：新間隔 = 舊間隔 * (分數/2) * 艾賓浩斯係數
        const factors = { 1: 0, 2: 1.2, 3: 2, 4: 4, 5: 10 };
        
        if (score === 1) {
            item.interval = 1; // 忘記了，重頭開始
        } else {
            item.interval = item.interval * factors[score];
        }
        
        item.nextReview = Date.now() + (item.interval * 60 * 60 * 1000); // 轉為毫秒
        saveData();
    }

    function render() {
        const list = document.getElementById('review-list');
        list.innerHTML = "";
        const now = Date.now();
        
        const dueItems = data.filter(item => item.nextReview <= now);

        if (dueItems.length === 0) {
            list.innerHTML = "<p style='text-align:center; color:#888;'>目前沒有待複習的項目！</p>";
            return;
        }

        dueItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div style="font-weight:bold; margin-bottom:10px;">${item.content}</div>
                <p style="font-size:12px; color:#666;">請評估記憶難度 (1最難 - 5最易)：</p>
                <div class="score-btns">
                    ${[1, 2, 3, 4, 5].map(s => `
                        <button class="score-btn score-${s}" onclick="handleReview(${item.id}, ${s})">${s}</button>
                    `).join('')}
                </div>
            `;
            list.appendChild(div);
        });
    }
</script>

</body>
</html>
